# Notify every Kryptalis install that a new commit has landed.
#
# How it works:
#   - On every push to main, this Action POSTs to ntfy.sh on a public topic.
#   - ntfy.sh holds a persistent SSE connection for each subscriber, so every
#     running install (which subscribes via kryptalis-update-listener.service)
#     receives the event within ~1 second.
#   - The listener then calls update.sh, which idempotently git fetches and
#     rebuilds only if the SHA actually changed.
#
# The ntfy topic is hardcoded so end-users need ZERO setup — they just install
# Kryptalis and instant updates work automatically. ntfy.sh is free, anonymous,
# rate-limited per-IP only, and the protocol is plain HTTPS POST/SSE.
name: Notify installs

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ntfy.sh subscribers
        run: |
          curl -fsS -X POST \
            -H "Title: Kryptalis update" \
            -H "Tags: rocket" \
            -d "${GITHUB_SHA:0:7} ${GITHUB_EVENT_HEAD_COMMIT_MESSAGE:-push to main}" \
            https://ntfy.sh/kryptalis-snowdenshadow-updates
        env:
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
