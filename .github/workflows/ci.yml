name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node (API + Dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @dockcontrol/types build

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Type-check API
        run: pnpm --filter @dockcontrol/api exec tsc --noEmit

      - name: Type-check Dashboard
        run: pnpm --filter @dockcontrol/dashboard exec tsc --noEmit

      - name: Lint API
        continue-on-error: false
        run: pnpm --filter @dockcontrol/api lint

      - name: Lint Dashboard
        continue-on-error: false
        run: pnpm --filter @dockcontrol/dashboard lint

      - name: Test API
        run: pnpm --filter @dockcontrol/api exec vitest run

      - name: Test Dashboard
        run: pnpm --filter @dockcontrol/dashboard exec vitest run

      # Full production builds — a compile-clean tree can still fail
      # `next build` (prerender errors) or `nest build`; with auto-update
      # deploying main everywhere, a broken build must never reach main.
      - name: Build API
        run: pnpm --filter @dockcontrol/api build

      - name: Build Dashboard
        run: pnpm --filter @dockcontrol/dashboard build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  e2e:
    name: E2E (Dashboard, Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The dashboard imports @dockcontrol/types from dist/ — the dev server
      # needs it built before it can compile any page.
      - name: Build shared types
        run: pnpm --filter @dockcontrol/types build

      - name: Install Playwright browser
        working-directory: apps/dashboard
        run: npx playwright install --with-deps chromium

      # All API traffic is mocked via page.route() — no backend required.
      - name: Run e2e tests
        continue-on-error: false
        run: pnpm --filter @dockcontrol/dashboard e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7

  go:
    name: Go (Agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/agent/go.sum

      - name: Gofmt
        # `gofmt -l` lists files that aren't formatted; any output → fail.
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  infra:
    name: Infra (compose, Docker, shell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # docker compose + buildx ship on ubuntu-latest runners — no setup step.
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

      # Build every first-party image so a broken Dockerfile fails CI before
      # it reaches main (auto-update deploys main everywhere). Multi-stage
      # contexts are large; build sequentially to keep runner memory sane.
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t dockcontrol-api:ci .

      - name: Build Dashboard image
        run: docker build -f apps/dashboard/Dockerfile --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000 -t dockcontrol-dashboard:ci .

      - name: Build SFTP image
        run: docker build -t dockcontrol-sftp:ci infra/sftp

      # shellcheck is preinstalled on ubuntu-latest. --severity=warning
      # blocks real bugs (unquoted globs, undefined vars) without failing on
      # pure style nits in the existing POSIX scripts.
      - name: ShellCheck install/update/entrypoint scripts
        run: shellcheck --severity=warning install.sh update.sh infra/sftp/entrypoint.sh
