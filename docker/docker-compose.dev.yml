services:
  postgres:
    image: postgres:16.6-alpine
    container_name: dockcontrol-postgres
    restart: unless-stopped
    ports:
      # Loopback only — dev credentials are fixed ('dockcontrol'), publishing
      # on all interfaces exposed the DB to the local network.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: dockcontrol
      POSTGRES_PASSWORD: dockcontrol
      POSTGRES_DB: dockcontrol
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  # redis was removed: the API has no redis client (no ioredis/redis dep,
  # REDIS_URL never read) — mirror of the prod compose decision.

volumes:
  postgres_data:
