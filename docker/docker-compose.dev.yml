services:
  postgres:
    image: postgres:16.6-alpine
    container_name: kryptalis-postgres
    restart: unless-stopped
    ports:
      # Loopback only — dev credentials are fixed ('kryptalis'), publishing
      # on all interfaces exposed the DB to the local network.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: kryptalis
      POSTGRES_PASSWORD: kryptalis
      POSTGRES_DB: kryptalis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kryptalis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: kryptalis-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
