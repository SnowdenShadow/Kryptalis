# DockControl — top-level stack
# Bring everything up with:   docker compose up -d
# Bring everything down with: docker compose down
#
# Services:
#   postgres   — primary database (loopback-only)
#   caddy      — reverse proxy (auto SSL via Let's Encrypt for linked domains)
#   api        — NestJS backend
#   dashboard  — Next.js dashboard
#
# Required secrets (refuse to start otherwise — see install.sh):
#   POSTGRES_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET, ENCRYPTION_KEY

# Pin the compose project name regardless of the cwd's basename. Without
# this, running `docker compose up` from anywhere other than a dir named
# "dockcontrol" (e.g. the auto-updater container, or a checkout in ~/src/app)
# would create a SECOND project with fresh empty volumes (app_postgres_data
# instead of dockcontrol_postgres_data) — apparent loss of the whole DB.
name: dockcontrol

services:
  postgres:
    image: postgres:16.6-alpine
    container_name: dockcontrol-postgres
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    environment:
      POSTGRES_USER: dockcontrol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (run install.sh or set it in .env)}
      POSTGRES_DB: dockcontrol
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Loopback-only — internal services reach it by DNS (postgres:5432).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  # redis was removed: the API never consumed it (no client, REDIS_URL never
  # read) — it only burned RAM on every install. Reintroduce alongside an
  # actual queue/cache implementation.

  caddy:
    image: caddy:2.9-alpine
    container_name: dockcontrol-caddy
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "20m", max-file: "5" } }
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      # Mount the DIRECTORY, not the single Caddyfile. A single-file bind mount
      # is bound by inode, so when the API rewrites the Caddyfile (every domain
      # change) the new inode is invisible to Caddy and it keeps serving the
      # stale seed → no domains, no certs. Mounting the directory makes every
      # rewrite visible immediately. Caddy reads /etc/caddy/Caddyfile by default.
      # NOTE: existing installs on the old single-file mount need ONE
      # `docker compose up -d` (compose recreates caddy on the volume change).
      - ./.dockcontrol/reverse-proxy:/etc/caddy:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - dockcontrol-apps
    # Caddy's admin API answers on :2019; we use it as a liveness probe.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dockcontrol-api
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "20m", max-file: "5" } }
    environment:
      DATABASE_URL: postgresql://dockcontrol:${POSTGRES_PASSWORD}@postgres:5432/dockcontrol
      API_PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      # Optional token TTLs. Defaults inline: compose always injects the
      # variable, so an empty value would bypass Joi's .default() (it only
      # applies to ABSENT keys, not empty strings).
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      # Optional comma-separated CORS allowlist; empty → derived from
      # PUBLIC_API_URL + local dev origins. A literal '*' is ignored unless
      # ALLOW_INSECURE_CORS=true (a wildcard + credentials would expose
      # authenticated sessions to any origin).
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ALLOW_INSECURE_CORS: ${ALLOW_INSECURE_CORS:-}
      # Optional — expose Swagger (/api/docs) in production. Off by default.
      SWAGGER_PUBLIC: ${SWAGGER_PUBLIC:-}
      # Background schedulers. Single-instance by default (runs them). Set false
      # on all-but-one replica in a multi-replica deploy to avoid duplicate
      # backups/metrics/cron runs.
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-}
      # Optional — GitHub OAuth app client id (git provider connect flow).
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      # Optional — enables AES-256-GCM at-rest encryption of backup dumps.
      # Kept separate from ENCRYPTION_KEY so backup access is siloed from app
      # secrets. Unset → backups remain plaintext on disk (sha256 still
      # recorded + verified on restore).
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      # Optional — Let's Encrypt contact email. If unset, DockControl derives one
      # from PUBLIC_API_URL (e.g. admin@mydomain.com). Bare IPs fall back to
      # anonymous registration (cert still works, just no expiry notices).
      ACME_EMAIL: ${ACME_EMAIL:-}
      # Where API persists app stacks, mail data, Caddyfile, etc.
      # MUST match the host mount path below so changes are visible to the
      # Caddy container too (which mounts the same .dockcontrol subfolder).
      DOCKCONTROL_DATA_DIR: /app/.dockcontrol
      # Host path corresponding to the .dockcontrol volume mount. Required when
      # API generates child docker-compose stacks (mail server, marketplace
      # apps): the docker daemon on the HOST resolves bind-mount sources
      # against the host filesystem, not the API container's filesystem.
      # install.sh writes the absolute value into .env — the ${PWD} fallback
      # only covers manual `docker compose up` runs from the install root.
      # NEVER rely on ${PWD} from a container (it would resolve to a path
      # that doesn't exist on the host and create phantom dirs at /).
      DOCKCONTROL_HOST_DATA_DIR: ${DOCKCONTROL_HOST_DATA_DIR:-${PWD}/.dockcontrol}
      # Optional SMTP transport for transactional mail (password reset,
      # invites, deployment + alert notifications). If SMTP_HOST is unset
      # the NotificationsService becomes a logged no-op — the API still
      # boots normally. The `${VAR:-}` pattern keeps compose happy when
      # the variable isn't defined in .env.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Public origin of the dashboard, used to build CTA links inside
      # email bodies. Defaults to localhost:3000 when unset.
      PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:-http://localhost:3000}
      # Auto-update: the install dir on the HOST. The API reads its
      # current SHA from <install_dir>/.git and spawns update.sh via
      # docker run with this dir mounted at the SAME path (host daemon
      # resolves mounts against the host fs). install.sh writes the
      # absolute value into .env; the ${PWD} fallback only covers manual
      # `docker compose up` runs from the install root.
      DOCKCONTROL_HOST_INSTALL_DIR: ${DOCKCONTROL_HOST_INSTALL_DIR:-${PWD}}
      # Optional — override the auto-detected owner/repo (the API
      # otherwise parses .git/config). Useful when running a fork.
      DOCKCONTROL_GITHUB_REPO: ${DOCKCONTROL_GITHUB_REPO:-}
      # Which branch the auto-update tracks. Default: main.
      DOCKCONTROL_BRANCH: ${DOCKCONTROL_BRANCH:-main}
      # Unattended auto-APPLY of updates. OFF by default — the updater does
      # `git reset --hard` + rebuild with the host docker socket and no commit
      # signature check, so unattended apply turns a push to the tracked branch
      # into root RCE. When false the dashboard still shows "update available"
      # and the operator applies manually. Set true only if you fully trust the
      # tracked branch.
      DOCKCONTROL_AUTO_UPDATE: ${DOCKCONTROL_AUTO_UPDATE:-}
    ports:
      # API_BIND lets operators restrict the REST API to loopback once Caddy
      # fronts it (API_BIND=127.0.0.1). Default stays 0.0.0.0 so a fresh
      # install is reachable before any domain is configured — same pattern
      # as DASHBOARD_BIND.
      - "${API_BIND:-0.0.0.0}:4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      # API persists generated docker-compose stacks, mail server configs,
      # Caddyfile, app sources etc. in .dockcontrol on the host.
      - ./.dockcontrol:/app/.dockcontrol
      # API needs to talk to the host Docker daemon to deploy user apps.
      - /var/run/docker.sock:/var/run/docker.sock
      # API writes a docker-compose.override.yml at the install root to
      # publish extra ports on the Caddy container (HTTPS on port-pinned
      # bindings). Mounting the override file individually keeps the rest
      # of the repo read-only.
      - ./docker-compose.override.yml:/app/install-root/docker-compose.override.yml
      # Auto-update: read-only access to ONLY the .git dir so the API can
      # resolve the current commit SHA (.git/HEAD) and the GitHub remote
      # (.git/config). Mounting just .git (not the whole repo) keeps .env and
      # every other source file out of the container — the updater code reads
      # nothing else here (system-updates.service.ts joins '/app/install-host'
      # + '.git/...', so the path stays /app/install-host/.git). update.sh
      # itself does NOT run from this mount — it spawns a separate
      # `docker run docker:cli` container with the host install path mounted.
      - ./.git:/app/install-host/.git:ro
    networks:
      # default — talk to postgres here.
      - default
      # dockcontrol-apps — shared bridge with Caddy + every user-deployed
      # container (including mail servers). Lets the API resolve other
      # containers by name (e.g. for the 'send test email' loopback).
      - dockcontrol-apps
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_started

  sftp:
    # Custom alpine + openssh image — see infra/sftp/.
    build:
      context: ./infra/sftp
    image: dockcontrol-sftp:latest
    container_name: dockcontrol-sftp
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    ports:
      - "${SFTP_PORT:-2222}:22"
    # Hardening — see infra/sftp/Dockerfile for the matching image-side
    # tightening (/bin/false shell on every account, no sudo, no su):
    #
    #   - cap_drop ALL → strip every Linux capability, then re-grant
    #     only what sshd + PAM strictly need:
    #       CHOWN/FOWNER/DAC_OVERRIDE/FSETID — PAM writes /etc/shadow
    #         and chpasswd manipulates file modes/owners as non-root.
    #       SETUID/SETGID — sshd drops privs to the connecting user.
    #       SYS_CHROOT   — ChrootDirectory + sshd privsep chroot.
    #       SYS_ADMIN    — mount --bind grafting (see cap_add note below
    #     for the full rationale: sshd's root:root 0755 chroot-leaf
    #     requirement + the ACL-mask/stat() interaction make bind mounts
    #     the only workable layout).
    #   - no-new-privileges blocks SUID escalation inside the container
    #     even if a user manages to write a binary to a writable mount.
    #   - pids_limit caps fork bombs from a compromised account.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN          # chown chroot leaf to root (sshd requirement)
      - DAC_OVERRIDE   # PAM writes /etc/shadow as non-root user
      - FOWNER         # chmod on files we don't own
      - FSETID         # preserve setuid bits on writes
      - SETUID         # sshd drops privs to user via setuid
      - SETGID         # sshd drops privs to group via setgid
      - SYS_CHROOT     # ChrootDirectory + sshd privsep chroot
      - SYS_ADMIN      # mount --bind: graft each user's app data dir
                       # under /home/<user>/app inside their chroot.
                       # Required because:
                       #   - ChrootDirectory has a hard sshd requirement
                       #     of root:root mode 0755 (no group/other write)
                       #     on the leaf.
                       #   - POSIX ACLs on the leaf don't work: the
                       #     kernel reports the ACL mask in stat()'s
                       #     group bits, which sshd reads as
                       #     "group-writable" and refuses.
                       #   - So the chroot leaf is a sterile /home/<user>
                       #     (sshd-compliant) and the writable app data
                       #     lives at /home/<user>/app, bind-mounted from
                       #     the actual source (Docker volume or host
                       #     appDir). ACLs go on the bind target — sshd
                       #     never inspects it, only the kernel does.
                       # Mount sources are server-computed from validated
                       # DB rows (regex-checked, no user input reaches
                       # the mount syscall). Combined with
                       # no-new-privileges, this caps the cap to mount
                       # operations on this container's own filesystem.
    security_opt:
      - no-new-privileges:true
      - apparmor:unconfined
    pids_limit: 200
    # Filesystem-level access:
    #
    #   - sftp_host_keys: persists ONLY the two host private/public key
    #     pairs (ssh_host_ed25519_key + ssh_host_rsa_key) at
    #     /var/lib/dockcontrol-sftp-keys. The entrypoint symlinks them into
    #     /etc/ssh at boot. We deliberately do NOT mount the whole
    #     /etc/ssh — a named volume mounted there would mask the baked
    #     sshd_config (and any future image-side changes), and the only
    #     thing we actually need to survive container recreate is the
    #     keys (so client `known_hosts` doesn't break).
    #   - sftp_users: PAM/shadow state (named — survives recreate).
    #   - sftp_homes: /home; per-user dirs are 0700 (created by useradd).
    #   - .dockcontrol/apps RW: git-deploys / compose-empty apps live
    #     here. Per-user ChrootDirectory keeps each user inside their
    #     own slice.
    #   - /var/lib/docker/volumes via rshared bind: marketplace apps
    #     store their code in Docker-managed named volumes. We mount
    #     the volumes ROOT so per-instance volume names (e.g.
    #     prestashop_data_cmq5xxx) need no compose regen on every new
    #     install. SftpService.discoverContainerCodePath validates the
    #     target volume actually belongs to the requested app before
    #     pointing the chroot at it.
    volumes:
      - sftp_host_keys:/var/lib/dockcontrol-sftp-keys
      - sftp_users:/etc/sftp-state
      - sftp_homes:/home
      - ./.dockcontrol/apps:/data/apps
      # Marketplace + docker-image apps store code in named volumes.
      # bind-propagation: rshared is CRITICAL: without it, the SFTP
      # container only sees /var/lib/docker/volumes as a flat directory
      # — every Docker named volume is actually a SUB-MOUNT (overlayfs)
      # of /var/lib/docker/volumes/<name>/_data, and Docker daemon
      # creates these mounts in the HOST namespace AFTER the SFTP
      # container starts. Without mount propagation, the SFTP namespace
      # sees the directory entries but reads zero bytes from inside.
      # rshared = recursively share mount events both ways. The compose
      # file syntax for this is the long-form "type: bind" block.
      - type: bind
        source: /var/lib/docker/volumes
        target: /data/volumes
        bind:
          propagation: rshared
      # Defence in depth on top of the above:
      #   1. SftpService.discoverContainerCodePath VALIDATES the volume
      #      name belongs to the requested app via docker inspect.
      #   2. The chroot in sshd_config (`ChrootDirectory %h`) locks
      #      every session into /home/<user>, never exposing /data/volumes.
      #   3. /home/<user> is root-owned 0755, so even if internal-sftp
      #      were misconfigured the user can't list siblings.
    healthcheck:
      test: ["CMD-SHELL", "pgrep sshd || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
    container_name: dockcontrol-dashboard
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
    # The dashboard publishes :3000 on every interface by default — that's
    # how a fresh install lets you reach the UI before any domain is wired.
    # Once you have a public domain + Caddy in front, set DASHBOARD_BIND=127.0.0.1
    # in .env so direct :3000 traffic no longer bypasses TLS.
    # DASHBOARD_PORT changes the published host port (container stays 3000).
    ports:
      - "${DASHBOARD_BIND:-0.0.0.0}:${DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

networks:
  # default — postgres/api/dashboard talk to each other here.
  # dockcontrol-apps — shared bridge that Caddy also joins. User apps the API
  #   deploys attach to it via `external: true`, which lets Caddy proxy by
  #   container_name (so we don't need host port publish on app containers
  #   and can serve HTTPS with a Let's Encrypt cert on any custom port).
  dockcontrol-apps:
    name: dockcontrol-apps
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  sftp_host_keys:
  sftp_users:
  sftp_homes:
