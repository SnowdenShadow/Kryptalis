# Kryptalis — top-level stack
# Bring everything up with:   docker compose up -d
# Bring everything down with: docker compose down
#
# Services:
#   postgres   — primary database (loopback-only)
#   redis      — cache & job queue (loopback-only)
#   caddy      — reverse proxy (auto SSL via Let's Encrypt for linked domains)
#   api        — NestJS backend
#   dashboard  — Next.js dashboard
#
# Required secrets (refuse to start otherwise — see install.sh):
#   POSTGRES_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET, ENCRYPTION_KEY

services:
  postgres:
    image: postgres:16-alpine
    container_name: kryptalis-postgres
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    environment:
      POSTGRES_USER: kryptalis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (run install.sh or set it in .env)}
      POSTGRES_DB: kryptalis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Loopback-only — internal services reach it by DNS (postgres:5432).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kryptalis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kryptalis-redis
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: kryptalis-caddy
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "20m", max-file: "5" } }
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./.kryptalis/reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - kryptalis-apps
    # Caddy's admin API answers on :2019; we use it as a liveness probe.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kryptalis-api
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "20m", max-file: "5" } }
    environment:
      DATABASE_URL: postgresql://kryptalis:${POSTGRES_PASSWORD}@postgres:5432/kryptalis
      REDIS_URL: redis://redis:6379
      API_PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      # Optional — enables AES-256-GCM at-rest encryption of backup dumps.
      # Kept separate from ENCRYPTION_KEY so backup access is siloed from app
      # secrets. Unset → backups remain plaintext on disk (sha256 still
      # recorded + verified on restore).
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      # Optional — Let's Encrypt contact email. If unset, Kryptalis derives one
      # from PUBLIC_API_URL (e.g. admin@mydomain.com). Bare IPs fall back to
      # anonymous registration (cert still works, just no expiry notices).
      ACME_EMAIL: ${ACME_EMAIL:-}
      # Where API persists app stacks, mail data, Caddyfile, etc.
      # MUST match the host mount path below so changes are visible to the
      # Caddy container too (which mounts the same .kryptalis subfolder).
      KRYPTALIS_DATA_DIR: /app/.kryptalis
      # Host path corresponding to the .kryptalis volume mount. Required when
      # API generates child docker-compose stacks (mail server, marketplace
      # apps): the docker daemon on the HOST resolves bind-mount sources
      # against the host filesystem, not the API container's filesystem.
      # Override via .env if your repo lives somewhere other than $PWD.
      KRYPTALIS_HOST_DATA_DIR: ${PWD}/.kryptalis
      # Optional SMTP transport for transactional mail (password reset,
      # invites, deployment + alert notifications). If SMTP_HOST is unset
      # the NotificationsService becomes a logged no-op — the API still
      # boots normally. The `${VAR:-}` pattern keeps compose happy when
      # the variable isn't defined in .env.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Public origin of the dashboard, used to build CTA links inside
      # email bodies. Defaults to localhost:3000 when unset.
      PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      # API persists generated docker-compose stacks, mail server configs,
      # Caddyfile, app sources etc. in .kryptalis on the host.
      - ./.kryptalis:/app/.kryptalis
      # API needs to talk to the host Docker daemon to deploy user apps.
      - /var/run/docker.sock:/var/run/docker.sock
      # API writes a docker-compose.override.yml at the install root to
      # publish extra ports on the Caddy container (HTTPS on port-pinned
      # bindings). Mounting the override file individually keeps the rest
      # of the repo read-only.
      - ./docker-compose.override.yml:/app/install-root/docker-compose.override.yml
    networks:
      # default — talk to postgres/redis here.
      - default
      # kryptalis-apps — shared bridge with Caddy + every user-deployed
      # container (including mail servers). Lets the API resolve other
      # containers by name (e.g. for the 'send test email' loopback).
      - kryptalis-apps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      caddy:
        condition: service_started

  sftp:
    # atmoz/sftp is a tiny, focused image: just OpenSSH with internal-sftp
    # forced and a CSV-style /etc/sftp-users.conf reload-on-change driver.
    # We don't use linuxserver/openssh because it's a kitchen-sink image
    # (full sshd, supervisord, ssh_config tooling) that we'd have to
    # untangle for a chroot-only flow.
    image: atmoz/sftp:latest
    container_name: kryptalis-sftp
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    # Standard SFTP port plus alt that's friendly to corp firewalls that
    # only allow :443/:2222 outbound. Both reach the same sshd.
    ports:
      - "${SFTP_PORT:-2222}:22"
    environment:
      # No env-driven user list. The Kryptalis API writes
      # /etc/sftp/users.conf + per-user authorized_keys files and reloads
      # the container so the changes pick up without restart.
      SSH_ENABLE_PASSWORD_AUTHENTICATION: "true"
    volumes:
      # Persistent SSH host keys so client `known_hosts` doesn't have to
      # be rewiped on every redeploy.
      - sftp_host_keys:/etc/ssh
      # SFTP config dir. We mount the WHOLE dir (not the single file) to
      # dodge the docker daemon's bind-source-must-exist trap: if we
      # mounted users.conf directly and the file didn't exist on the
      # host yet, daemon would silently create an empty directory at
      # both the mount source AND target, then API writes to "users.conf"
      # would fail with EISDIR forever. Mounting the parent dir is
      # idempotent: an empty .kryptalis/sftp dir is fine, and the API
      # writes users.conf + userconf/<user>/keys/ inside it at runtime.
      - ./.kryptalis/sftp:/etc/sftp
      # The actual data: we bind-mount the whole apps/ tree read-write
      # so each chrooted user maps into their app's appDir directly.
      # The chrootDir field in users.conf points inside this volume.
      - ./.kryptalis/apps:/data/apps
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/22 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
    container_name: kryptalis-dashboard
    restart: unless-stopped
    logging: { driver: json-file, options: { max-size: "10m", max-file: "5" } }
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
    # The dashboard publishes :3000 on every interface by default — that's
    # how a fresh install lets you reach the UI before any domain is wired.
    # Once you have a public domain + Caddy in front, set DASHBOARD_BIND=127.0.0.1
    # in .env so direct :3000 traffic no longer bypasses TLS.
    ports:
      - "${DASHBOARD_BIND:-0.0.0.0}:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

networks:
  # default — postgres/redis/api/dashboard talk to each other here.
  # kryptalis-apps — shared bridge that Caddy also joins. User apps the API
  #   deploys attach to it via `external: true`, which lets Caddy proxy by
  #   container_name (so we don't need host port publish on app containers
  #   and can serve HTTPS with a Let's Encrypt cert on any custom port).
  kryptalis-apps:
    name: kryptalis-apps
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  sftp_host_keys:
